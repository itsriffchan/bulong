# PH-Whisper Configuration File

model:
  name: "openai/whisper-tiny"
  language: "tagalog"
  task: "transcribe"

dataset:
  name: "google/fleurs"
  config: "fil_ph"
  split: "train"
  streaming: true

lora:
  r: 8
  alpha: 32
  dropout: 0.05
  target_modules:
    - "q_proj"
    - "v_proj"

training:
  learning_rate: 1e-3
  batch_size: 2
  gradient_accumulation_steps: 2
  max_steps: 10
  save_steps: 5
  eval_steps: 5
  output_dir: "./training/whisper-tiny-lora-fil"
  fp16: false
